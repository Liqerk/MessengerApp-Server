version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: messenger-postgres
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strong_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - messenger-network

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: messenger-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DB_URL: jdbc:postgresql://postgres:5432/messenger
      DB_USER: messenger
      DB_PASSWORD: ${DB_PASSWORD:-strong_password_123}
      DB_MAX_POOL_SIZE: 20
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-production}
      JWT_ISSUER: messenger-server
      JWT_AUDIENCE: messenger-client
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_PERIOD: 60000
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads      # ← КРИТИЧНОЕ ИСПРАВЛЕНИЕ
    networks:
      - messenger-network

volumes:
  postgres_data:
  uploads_data:                     # ← Добавлено

networks:
  messenger-network:
    driver: bridge